<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REVERSO — Gravador Inverso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #030608;
      --bg2:       #060d12;
      --cyan:      #00FFFF;
      --magenta:   #FF00CC;
      --cyan-dim:  rgba(0,255,255,0.12);
      --cyan-glow: rgba(0,255,255,0.45);
      --mag-dim:   rgba(255,0,204,0.12);
      --mag-glow:  rgba(255,0,204,0.45);
      --text:      #c8f0f5;
      --text-dim:  #3a6070;
      --border:    rgba(0,255,255,0.15);
      --card:      rgba(0,255,255,0.04);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      overflow-x: hidden;
    }

    /* ── scanline overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.18) 2px,
        rgba(0,0,0,0.18) 4px
      );
    }

    /* ── grid background ── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .app {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px 60px;
      gap: 0;
    }

    /* ── header ── */
    .header {
      text-align: center;
      margin-bottom: 48px;
    }
    .header-sub {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 6px;
      color: var(--magenta);
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: 0.85;
    }
    .header h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(2.4rem, 8vw, 4.2rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1;
      background: linear-gradient(135deg, var(--cyan) 0%, var(--magenta) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 28px var(--cyan-glow));
    }
    .header-tagline {
      margin-top: 12px;
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* ── main card ── */
    .card {
      width: 100%;
      max-width: 680px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 36px 32px 40px;
      position: relative;
      box-shadow: 0 0 60px rgba(0,255,255,0.05), inset 0 0 40px rgba(0,0,0,0.4);
    }
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border-color: var(--cyan);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    /* ── status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: all 0.3s;
    }
    .status-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      transition: color 0.3s;
      flex: 1;
    }
    .timer {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--text-dim);
      transition: color 0.3s;
    }

    /* state classes */
    .state-recording .status-dot {
      background: #ff3355;
      box-shadow: 0 0 10px rgba(255,51,85,0.8);
      animation: blink 1s infinite;
    }
    .state-recording .status-label { color: #ff3355; }
    .state-recording .timer { color: #ff3355; }

    .state-processing .status-dot {
      background: var(--magenta);
      box-shadow: 0 0 10px var(--mag-glow);
      animation: spin-dot 0.8s linear infinite;
    }
    .state-processing .status-label { color: var(--magenta); }

    .state-ready .status-dot {
      background: var(--cyan);
      box-shadow: 0 0 10px var(--cyan-glow);
    }
    .state-ready .status-label { color: var(--cyan); }
    .state-ready .timer { color: var(--cyan); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    @keyframes spin-dot {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.6); }
      100% { transform: scale(1); }
    }

    /* ── waveform ── */
    .waveform-wrapper {
      position: relative;
      width: 100%;
      height: 120px;
      margin-bottom: 36px;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      background: rgba(0,0,0,0.5);
    }
    .waveform-wrapper::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(0,0,0,0.6) 0%, transparent 10%, transparent 90%, rgba(0,0,0,0.6) 100%);
      z-index: 1; pointer-events: none;
    }
    #waveform {
      width: 100%; height: 100%;
      display: block;
    }
    .waveform-idle-text {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
      color: var(--text-dim);
      pointer-events: none;
      transition: opacity 0.4s;
    }

    /* ── buttons ── */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .btn-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn {
      position: relative;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      border: 1px solid transparent;
      border-radius: 2px;
      padding: 14px 12px;
      cursor: pointer;
      background: transparent;
      color: var(--text-dim);
      transition: all 0.25s;
      overflow: hidden;
      white-space: nowrap;
    }
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* record */
    .btn-record {
      border-color: #ff3355;
      color: #ff3355;
    }
    .btn-record::before { background: rgba(255,51,85,0.08); }
    .btn-record:not(:disabled):hover { color: #fff; background: rgba(255,51,85,0.15); box-shadow: 0 0 20px rgba(255,51,85,0.3); }
    .btn-record.active {
      color: #fff;
      border-color: #ff3355;
      background: rgba(255,51,85,0.12);
      box-shadow: 0 0 0 0 rgba(255,51,85,0.5);
      animation: pulse-rec 1.4s ease-out infinite;
    }
    @keyframes pulse-rec {
      0%   { box-shadow: 0 0 0 0 rgba(255,51,85,0.55); }
      70%  { box-shadow: 0 0 0 14px rgba(255,51,85,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,51,85,0); }
    }

    /* stop */
    .btn-stop {
      border-color: rgba(255,150,50,0.4);
      color: rgba(255,150,50,0.5);
    }
    .btn-stop:not(:disabled):hover { color: #ffaa33; border-color: #ffaa33; background: rgba(255,170,50,0.1); box-shadow: 0 0 18px rgba(255,170,50,0.25); }

    /* play */
    .btn-play {
      border-color: var(--border);
      color: var(--text-dim);
    }
    .btn-play:not(:disabled):hover { color: var(--magenta); border-color: var(--magenta); background: var(--mag-dim); box-shadow: 0 0 20px var(--mag-glow); }
    .btn-play.playing { color: var(--magenta); border-color: var(--magenta); background: var(--mag-dim); animation: pulse-play 1.4s ease-out infinite; }
    @keyframes pulse-play {
      0%   { box-shadow: 0 0 0 0 var(--mag-glow); }
      70%  { box-shadow: 0 0 0 14px rgba(255,0,204,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,0,204,0); }
    }

    /* download */
    .btn-dl {
      border-color: var(--border);
      color: var(--text-dim);
    }
    .btn-dl:not(:disabled):hover { color: var(--cyan); border-color: var(--cyan); background: var(--cyan-dim); box-shadow: 0 0 20px var(--cyan-glow); }

    /* ── error message ── */
    .error-msg {
      display: none;
      margin-top: 20px;
      padding: 14px 16px;
      border: 1px solid rgba(255,51,85,0.4);
      background: rgba(255,51,85,0.06);
      color: #ff6680;
      font-size: 11px;
      line-height: 1.7;
      letter-spacing: 0.5px;
      border-radius: 2px;
    }
    .error-msg.visible { display: block; }
    .error-msg strong { color: #ff3355; }

    /* ── processing overlay ── */
    .processing-overlay {
      display: none;
      position: absolute; inset: 0;
      background: rgba(3,6,8,0.88);
      z-index: 10;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 18px;
      border-radius: 2px;
    }
    .processing-overlay.visible { display: flex; }
    .proc-ring {
      width: 48px; height: 48px;
      border: 2px solid rgba(255,0,204,0.15);
      border-top-color: var(--magenta);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .proc-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--magenta);
      text-transform: uppercase;
    }

    /* ── duration info ── */
    .info-row {
      display: flex;
      gap: 24px;
      margin-top: 20px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }
    .info-item { flex: 1; }
    .info-key {
      font-size: 8px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 4px;
    }
    .info-val {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      color: var(--text-dim);
      transition: color 0.3s;
    }
    .info-val.active { color: var(--cyan); }

    /* ── footer ── */
    .footer {
      margin-top: 36px;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      opacity: 0.45;
    }

    @media (max-width: 480px) {
      .card { padding: 24px 18px 28px; }
      .btn-row, .btn-row-2 { grid-template-columns: 1fr 1fr; }
      .btn { font-size: 9px; padding: 12px 8px; }
    }
  </style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="header-sub">// sistema de áudio reverso //</div>
    <h1>REVERSO</h1>
    <div class="header-tagline">grave · inverta · reproduza</div>
  </header>

  <div class="card" id="mainCard">

    <!-- processing overlay -->
    <div class="processing-overlay" id="procOverlay">
      <div class="proc-ring"></div>
      <div class="proc-label">Invertendo áudio…</div>
    </div>

    <!-- status bar -->
    <div class="status-bar">
      <div class="status-dot"></div>
      <div class="status-label" id="statusLabel">Aguardando</div>
      <div class="timer" id="timer">00:00</div>
    </div>

    <!-- waveform -->
    <div class="waveform-wrapper">
      <canvas id="waveform"></canvas>
      <div class="waveform-idle-text" id="idleText">microfone inativo</div>
    </div>

    <!-- buttons -->
    <div class="btn-row">
      <button class="btn btn-record" id="btnRecord">⬤ Gravar</button>
      <button class="btn btn-stop"   id="btnStop"   disabled>■ Parar</button>
    </div>
    <div class="btn-row-2">
      <button class="btn btn-play"   id="btnPlay"   disabled>▶ Reproduzir Inverso</button>
      <button class="btn btn-dl"     id="btnDl"     disabled>↓ Download</button>
    </div>

    <!-- error -->
    <div class="error-msg" id="errorMsg"></div>

    <!-- info -->
    <div class="info-row">
      <div class="info-item">
        <div class="info-key">Duração gravada</div>
        <div class="info-val" id="infoDur">—</div>
      </div>
      <div class="info-item">
        <div class="info-key">Sample rate</div>
        <div class="info-val" id="infoSR">—</div>
      </div>
      <div class="info-item">
        <div class="info-key">Canais</div>
        <div class="info-val" id="infoCH">—</div>
      </div>
    </div>
  </div>

  <footer class="footer">REVERSO v1.0 · Web Audio API · MediaRecorder</footer>
</div>

<script>
(() => {
  // ── DOM ──────────────────────────────────────────────────────────────────
  const card       = document.getElementById('mainCard');
  const btnRecord  = document.getElementById('btnRecord');
  const btnStop    = document.getElementById('btnStop');
  const btnPlay    = document.getElementById('btnPlay');
  const btnDl      = document.getElementById('btnDl');
  const timerEl    = document.getElementById('timer');
  const statusEl   = document.getElementById('statusLabel');
  const errorEl    = document.getElementById('errorMsg');
  const idleText   = document.getElementById('idleText');
  const procOverlay= document.getElementById('procOverlay');
  const canvas     = document.getElementById('waveform');
  const ctx2d      = canvas.getContext('2d');
  const infoDur    = document.getElementById('infoDur');
  const infoSR     = document.getElementById('infoSR');
  const infoCH     = document.getElementById('infoCH');

  // ── State ─────────────────────────────────────────────────────────────────
  const STATE = { IDLE: 'idle', RECORDING: 'recording', PROCESSING: 'processing', READY: 'ready' };
  let state = STATE.IDLE;

  let mediaRecorder   = null;
  let audioChunks     = [];
  let audioCtx        = null;
  let analyser        = null;
  let animFrame       = null;
  let timerInterval   = null;
  let timerSecs       = 0;
  let reversedBuffer  = null;   // AudioBuffer do áudio invertido
  let reversedBlob    = null;   // Blob para download
  let playingSource   = null;
  let stream          = null;

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setError(msg) {
    errorEl.innerHTML = msg;
    errorEl.classList.toggle('visible', !!msg);
  }

  function setState(s) {
    state = s;
    card.className = `card state-${s}`;
    switch (s) {
      case STATE.IDLE:
        statusEl.textContent = 'Aguardando';
        btnRecord.disabled = false;
        btnRecord.classList.remove('active');
        btnStop.disabled   = true;
        btnPlay.disabled   = !reversedBuffer;
        btnDl.disabled     = !reversedBlob;
        timerEl.style.color = '';
        break;
      case STATE.RECORDING:
        statusEl.textContent = 'Gravando';
        btnRecord.disabled = true;
        btnRecord.classList.add('active');
        btnStop.disabled   = false;
        btnPlay.disabled   = true;
        btnDl.disabled     = true;
        idleText.style.opacity = '0';
        break;
      case STATE.PROCESSING:
        statusEl.textContent = 'Processando';
        btnRecord.disabled = true;
        btnStop.disabled   = true;
        btnPlay.disabled   = true;
        btnDl.disabled     = true;
        procOverlay.classList.add('visible');
        break;
      case STATE.READY:
        statusEl.textContent = 'Pronto';
        btnRecord.disabled = false;
        btnRecord.classList.remove('active');
        btnStop.disabled   = true;
        btnPlay.disabled   = false;
        btnDl.disabled     = false;
        procOverlay.classList.remove('visible');
        idleText.style.opacity = '1';
        idleText.textContent = 'áudio pronto — ouça ao contrário';
        break;
    }
  }

  function formatTime(secs) {
    const m = String(Math.floor(secs / 60)).padStart(2, '0');
    const s = String(secs % 60).padStart(2, '0');
    return `${m}:${s}`;
  }

  // ── Canvas resize ─────────────────────────────────────────────────────────
  function resizeCanvas() {
    const wrapper = canvas.parentElement;
    canvas.width  = wrapper.offsetWidth;
    canvas.height = wrapper.offsetHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // ── Waveform drawing ──────────────────────────────────────────────────────
  function drawIdle() {
    const W = canvas.width, H = canvas.height;
    ctx2d.clearRect(0, 0, W, H);
    const barCount = Math.floor(W / 6);
    for (let i = 0; i < barCount; i++) {
      const x = (i / barCount) * W;
      const h = 3 + Math.sin(Date.now() * 0.001 + i * 0.3) * 2;
      ctx2d.fillStyle = 'rgba(0,255,255,0.08)';
      ctx2d.fillRect(x + 1, H / 2 - h / 2, 4, h);
    }
    animFrame = requestAnimationFrame(drawIdle);
  }

  function drawLive() {
    if (!analyser) return;
    const W = canvas.width, H = canvas.height;
    const bufLen = analyser.frequencyBinCount;
    const data   = new Uint8Array(bufLen);
    analyser.getByteFrequencyData(data);

    ctx2d.clearRect(0, 0, W, H);

    const barCount = Math.min(bufLen, Math.floor(W / 5));
    const barW     = W / barCount;

    for (let i = 0; i < barCount; i++) {
      const t   = data[Math.floor(i * bufLen / barCount)] / 255;
      const bh  = Math.max(3, t * H * 0.9);
      const x   = i * barW;
      const y   = (H - bh) / 2;

      // gradient per bar
      const grad = ctx2d.createLinearGradient(0, y, 0, y + bh);
      grad.addColorStop(0,   `rgba(255,0,204,${0.3 + t * 0.7})`);
      grad.addColorStop(0.5, `rgba(0,255,255,${0.5 + t * 0.5})`);
      grad.addColorStop(1,   `rgba(255,0,204,${0.3 + t * 0.7})`);

      ctx2d.fillStyle = grad;
      ctx2d.fillRect(x + 1, y, Math.max(1, barW - 2), bh);

      // glow on tall bars
      if (t > 0.5) {
        ctx2d.shadowColor  = '#00FFFF';
        ctx2d.shadowBlur   = 8;
        ctx2d.fillRect(x + 1, y, Math.max(1, barW - 2), bh);
        ctx2d.shadowBlur   = 0;
      }
    }

    animFrame = requestAnimationFrame(drawLive);
  }

  function drawReady() {
    const W = canvas.width, H = canvas.height;
    ctx2d.clearRect(0, 0, W, H);
    const barCount = Math.floor(W / 6);
    const t = Date.now() * 0.001;
    for (let i = 0; i < barCount; i++) {
      const norm = (Math.sin(t * 1.2 + i * 0.25) + Math.sin(t * 0.7 + i * 0.5)) / 2;
      const h = 4 + Math.abs(norm) * 28;
      const x = (i / barCount) * W;
      const alpha = 0.15 + Math.abs(norm) * 0.35;
      ctx2d.fillStyle = `rgba(0,255,255,${alpha})`;
      ctx2d.fillRect(x + 1, H / 2 - h / 2, 4, h);
    }
    animFrame = requestAnimationFrame(drawReady);
  }

  function stopAnim() {
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  }

  // start idle animation immediately
  drawIdle();

  // ── Record ────────────────────────────────────────────────────────────────
  btnRecord.addEventListener('click', async () => {
    setError('');
    stopAnim();

    // stop any playing audio
    if (playingSource) { try { playingSource.stop(); } catch(e){} playingSource = null; }
    btnPlay.classList.remove('playing');

    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    } catch (err) {
      const msg = err.name === 'NotAllowedError'
        ? `<strong>Permissão negada.</strong> Permita o acesso ao microfone nas configurações do navegador e tente novamente.`
        : `<strong>Erro:</strong> ${err.message}`;
      setError(msg);
      drawIdle();
      return;
    }

    // set up AudioContext & AnalyserNode
    audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
    analyser  = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.7;

    const src = audioCtx.createMediaStreamSource(stream);
    src.connect(analyser);
    // do NOT connect analyser to destination → no feedback

    // timer
    timerSecs = 0;
    timerEl.textContent = '00:00';
    timerInterval = setInterval(() => {
      timerSecs++;
      timerEl.textContent = formatTime(timerSecs);
    }, 1000);

    // MediaRecorder
    audioChunks  = [];
    reversedBuffer = null;
    reversedBlob   = null;

    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : 'audio/webm';

    mediaRecorder = new MediaRecorder(stream, { mimeType });
    mediaRecorder.addEventListener('dataavailable', e => {
      if (e.data.size > 0) audioChunks.push(e.data);
    });
    mediaRecorder.addEventListener('stop', onRecordStop);
    mediaRecorder.start(100);

    setState(STATE.RECORDING);
    drawLive();
  });

  // ── Stop ──────────────────────────────────────────────────────────────────
  btnStop.addEventListener('click', () => {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    // stop stream tracks
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    clearInterval(timerInterval);
    stopAnim();
    setState(STATE.PROCESSING);
  });

  // ── Process recorded audio ────────────────────────────────────────────────
  async function onRecordStop() {
    const blob = new Blob(audioChunks, { type: audioChunks[0]?.type || 'audio/webm' });
    const arrayBuffer = await blob.arrayBuffer();

    let decoded;
    try {
      decoded = await audioCtx.decodeAudioData(arrayBuffer);
    } catch (err) {
      setError(`<strong>Erro ao decodificar áudio:</strong> ${err.message}`);
      setState(STATE.IDLE);
      drawIdle();
      return;
    }

    // ── Reverse each channel ──────────────────────────────────────────────
    const numChannels = decoded.numberOfChannels;
    const length      = decoded.length;
    const sampleRate  = decoded.sampleRate;

    const revCtx = new OfflineAudioContext(numChannels, length, sampleRate);
    const revBuf  = revCtx.createBuffer(numChannels, length, sampleRate);

    for (let ch = 0; ch < numChannels; ch++) {
      const channelData = new Float32Array(length);
      decoded.copyFromChannel(channelData, ch);
      channelData.reverse();
      revBuf.copyToChannel(channelData, ch);
    }

    reversedBuffer = revBuf;

    // update info
    infoDur.textContent = `${decoded.duration.toFixed(2)}s`;
    infoDur.classList.add('active');
    infoSR.textContent  = `${sampleRate / 1000}kHz`;
    infoSR.classList.add('active');
    infoCH.textContent  = numChannels === 1 ? 'Mono' : 'Estéreo';
    infoCH.classList.add('active');

    // ── Render to Blob for download ───────────────────────────────────────
    try {
      const src2 = revCtx.createBufferSource();
      src2.buffer = revBuf;
      src2.connect(revCtx.destination);
      src2.start(0);
      const rendered = await revCtx.startRendering();
      reversedBlob = audioBufferToWavBlob(rendered);
    } catch (err) {
      console.warn('Could not render to WAV:', err);
    }

    setState(STATE.READY);
    stopAnim();
    drawReady();
  }

  // ── Play reversed ─────────────────────────────────────────────────────────
  btnPlay.addEventListener('click', () => {
    if (!reversedBuffer) return;

    if (playingSource) {
      try { playingSource.stop(); } catch(e){}
      playingSource = null;
      btnPlay.textContent = '▶ Reproduzir Inverso';
      btnPlay.classList.remove('playing');
      return;
    }

    // resume AudioContext if suspended
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const src = audioCtx.createBufferSource();
    src.buffer = reversedBuffer;
    src.connect(audioCtx.destination);
    src.start(0);
    playingSource = src;
    btnPlay.textContent = '■ Parar';
    btnPlay.classList.add('playing');

    src.onended = () => {
      playingSource = null;
      btnPlay.textContent = '▶ Reproduzir Inverso';
      btnPlay.classList.remove('playing');
    };
  });

  // ── Download ──────────────────────────────────────────────────────────────
  btnDl.addEventListener('click', () => {
    if (!reversedBlob) return;
    const url = URL.createObjectURL(reversedBlob);
    const a   = document.createElement('a');
    a.href     = url;
    a.download = `reverso_${Date.now()}.wav`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  });

  // ── AudioBuffer → WAV Blob ────────────────────────────────────────────────
  function audioBufferToWavBlob(buffer) {
    const numCh     = buffer.numberOfChannels;
    const length    = buffer.length;
    const sampleRate= buffer.sampleRate;
    const bitsPerSample = 16;
    const byteRate  = sampleRate * numCh * bitsPerSample / 8;
    const blockAlign= numCh * bitsPerSample / 8;
    const dataSize  = length * numCh * bitsPerSample / 8;
    const wavBuffer = new ArrayBuffer(44 + dataSize);
    const view      = new DataView(wavBuffer);

    function writeStr(offset, str) {
      for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
    }

    writeStr(0, 'RIFF');
    view.setUint32(4,  36 + dataSize, true);
    writeStr(8, 'WAVE');
    writeStr(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20,  1, true);   // PCM
    view.setUint16(22, numCh, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, byteRate, true);
    view.setUint16(32, blockAlign, true);
    view.setUint16(34, bitsPerSample, true);
    writeStr(36, 'data');
    view.setUint32(40, dataSize, true);

    let offset = 44;
    for (let i = 0; i < length; i++) {
      for (let ch = 0; ch < numCh; ch++) {
        const sample = Math.max(-1, Math.min(1, buffer.getChannelData(ch)[i]));
        view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
        offset += 2;
      }
    }

    return new Blob([wavBuffer], { type: 'audio/wav' });
  }

})();
</script>
